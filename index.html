            6: { n: "6백금성(六白金星)", duration: "1박 2일", luck: "승진/권위, 귀인 조우, 대규모 투자", loc: "대형 사찰, 웅장한 바위산, 관공서, 고급 호텔", food: "고급 한정식, 둥근 과일(사과/멜론)", drink: "고급 명주, 스파클링 워터", goodColor: "백색, 은색, 금색", goodItem: "고급 아날로그 시계, 도장", badColor: "적색, 분홍색", badItem: "은색 반지 다수, 흰색 상의", act: "사찰 참배 및 기도, 격식 차리기" },
            7: { n: "7적금성(七赤金星)", duration: "당일~1박 2일", luck: "여유 금전운, 유희/연애운, 화술 향상", loc: "얕은 계곡, 번화가, 화려한 카페, 은행", food: "치킨 등 튀김류, 달콤한 디저트", drink: "달콤한 커피, 칵테일", goodColor: "핑크, 오렌지", goodItem: "작은 종, 화려한 립스틱", badColor: "적색, 분홍색", badItem: "핑크색 파우치, 화려한 귀걸이", act: "카페 수다, 현금 소비, 많이 웃기" },

            9: { n: "9자화성(九紫火星)", duration: "당일 집중", luck: "미용/예술운, 시험 합격, 선견지명, 명예", loc: "미술관, 도서관, 야경 명소, 미용실, 채광 좋은 곳", food: "갑각류(게/새우), 붉은 살코기, 초콜릿", drink: "레드 와인, 블랙 커피", goodColor: "적색, 보라색", goodItem: "안경/선글라스, 예술 서적", badColor: "흑색, 어두운 색", badItem: "붉은색 양말", act: "미술 작품 감상, 문서/일기 작성" }

        const posNames = ["중앙", "서북", "서", "북동", "남", "북", "남서", "동", "동남"];
        const opposites = { "서북": "동남", "동남": "서북", "서": "동", "동": "서", "북동": "남서", "남서": "북동", "남": "북", "북": "남", "중앙": "없음" };
        const branchTimeMap = ["자(23~01)", "축(01~03)", "인(03~05)", "묘(05~07)", "진(07~09)", "사(09~11)", "오(11~13)", "미(13~15)", "신(15~17)", "유(17~19)", "술(19~21)", "해(21~23)"];

        window.onload = function() {
            initMap();
            const savedBD = localStorage.getItem('masterBirthDate');
            const savedBT = localStorage.getItem('masterBirthTime');
            let today = new Date();
            if(savedBD) document.getElementById('birth-date').value = savedBD;
            if(savedBT) document.getElementById('birth-time').value = savedBT;
            document.getElementById('travel-date').value = today.toISOString().split('T')[0];
        };

        function initMap() {
            var loc = { lat: 37.785, lng: 126.833 };
            map = new google.maps.Map(document.getElementById('map'), { center: loc, zoom: 7.2, mapTypeId: 'roadmap' });
            centerMarker = new google.maps.Marker({ position: loc, map: map, draggable: true });
            geocoder = new google.maps.Geocoder();
            centerMarker.addListener('dragend', function() { analyzeDirection(); });
        }

        function searchLocation() {
            var addr = document.getElementById('search-address').value;
            if(!addr || !geocoder) return;
            geocoder.geocode({ 'address': addr }, function(r, s) {
                if (s === 'OK') {
                    var newPos = r[0].geometry.location;
                    map.setCenter(newPos);
                    centerMarker.setPosition(newPos);
                    analyzeDirection();
                }
            });
        }

        function getStarVal(y, m, d, mode) {
            y = parseInt(y, 10); m = parseInt(m, 10); d = parseInt(d, 10);

            if (mode === 'y') {
                if (m < 2 || (m === 2 && d < 4)) y -= 1;
                let s = String(y).split('').reduce((a,b) => parseInt(a)+parseInt(b), 0);
                while(s > 9) s = String(s).split('').reduce((a,b) => parseInt(a)+parseInt(b), 0);
                let res = 11 - s;
                while(res <= 0) res += 9;
                while(res > 9) res -= 9;
                return res;
            }

            if (mode === 'm') {
                let adjY = (m < 2 || (m === 2 && d < 4)) ? y - 1 : y;
                let zodiac = (adjY - 4) % 12;
                if(zodiac < 0) zodiac += 12;
                let base = [0,3,6,9].includes(zodiac) ? 8 : ([1,4,7,10].includes(zodiac) ? 5 : 2);
                let offset = m < 2 ? m + 10 : m - 2;
                let res = base - offset;
                while(res <= 0) res += 9;
                while(res > 9) res -= 9;
                return res;
            }

            let ts = Date.UTC(y, m-1, d);
            let days = Math.floor(ts / 86400000);
            let res = ((days + 5) % 9) + 1;
            return res;
        }

        function getTimeStar(dStar, timeStr) {
            let hour = parseInt(timeStr.split(':')[0], 10);
            let branchIdx = Math.floor((hour + 1) % 24 / 2);
            let base = [1,4,7].includes(dStar) ? 8 : ([2,5,8].includes(dStar) ? 5 : 2);
            let tStar = base + branchIdx;
            while(tStar > 9) tStar -= 9;
            return tStar;
        }

        function analyzeDirection() {
            try {
                let bStr = document.getElementById('birth-date').value,
                    tStr = document.getElementById('travel-date').value,
                    tTime = document.getElementById('travel-time').value;
                if(!bStr || !tStr) { alert("날짜 정보를 입력하십시오."); return; }

                localStorage.setItem('masterBirthDate', bStr);
                localStorage.setItem('masterBirthTime', document.getElementById('birth-time').value);

                let b = bStr.split('-'), t = tStr.split('-');
                let myS = getStarVal(b[0], b[1], b[2], 'y');
                let yS = getStarVal(t[0], t[1], t[2], 'y');
                let mS = getStarVal(t[0], t[1], t[2], 'm');
                let dS = getStarVal(t[0], t[1], t[2], 'd');
                let tS = getTimeStar(dS, tTime);

                let bds = [yS, mS, dS].map(c => {
                    let obj={}, cur=c;
                    for(let i=0; i<9; i++){ obj[posNames[i]]=cur; cur++; if(cur>9) cur=1; }
                    return obj;
                });
                let timeObj={}, curT=tS;
                for(let i=0; i<9; i++){ timeObj[posNames[i]]=curT; curT++; if(curT>9) curT=1; }

                let myElement = [1].includes(myS)?'수':([2,5,8].includes(myS)?'토':([3,4].includes(myS)?'목':([6,7].includes(myS)?'금':'화')));
                let goodEls = {'수':[6,7,1,3,4],'목':[1,3,4,9],'화':[3,4,9,2,8],'토':[9,2,8,6,7],'금':[2,8,6,7,1]}[myElement];

                let scores={}, results={}, shortTrip={};

                posNames.forEach(dir => {
                    if(dir === "중앙") return;
                    let sc=0, bads=[];
                    bds.forEach((board, idx) => {
                        let st=board[dir], w=idx===0?60:(idx===1?30:10), isB=false;
                        
                        if(st===5){
                            bads.push(idx===0?"연오황":idx===1?"월오황":"일오황"); isB=true;
                        } else if(board[opposites[dir]]===5){
                            bads.push(idx===0?"연암검":idx===1?"월암검":"일암검"); isB=true;
                        } else if(st===myS){
                            bads.push(idx===0?"연본명":idx===1?"월본명":"일본명"); isB=true;
                        } else if(board[opposites[dir]]===myS){
                            bads.push(idx===0?"연적살":idx===1?"월적살":"일적살"); isB=true;
                        }
                        
                        if(!isB) sc += (goodEls.includes(st)?w:w/4); else sc -= 100;
                    });
                    scores[dir] = Math.max(0, Math.round(sc));
                    results[dir] = { sc: Math.max(0, Math.round(sc)), b: [...new Set(bads)], stars: [bds[0][dir], bds[1][dir], bds[2][dir]] };
                    let ts2 = timeObj[dir];
                    shortTrip[dir] = {
                        good: (!(ts2===5 || timeObj[opposites[dir]]===5 || ts2===myS || timeObj[opposites[dir]]===myS) && goodEls.includes(ts2)),
                        star: ts2
                    };
                });

                wedges.forEach(w => w.setMap(null)); wedges=[];
                dirLabels.forEach(l => l.setMap(null)); dirLabels=[];
                let cp = centerMarker.getPosition();
                const dAn = {
                    "북":   {s:337.5, e:382.5}, "북동":{s:22.5,  e:67.5 },
                    "동":   {s:67.5,  e:112.5}, "동남":{s:112.5, e:157.5},
                    "남":   {s:157.5, e:202.5}, "남서":{s:202.5, e:247.5},
                    "서":   {s:247.5, e:292.5}, "서북":{s:292.5, e:337.5}
                };

                for(let d in dAn){
                    let s=scores[d], c=s>=90?'#0000ff':(s>=60?'#00bcd4':(s>=30?'#ff9800':'#ff0000')), p=[{lat:cp.lat(),lng:cp.lng()}];
                    for(let a=dAn[d].s; a<=dAn[d].e; a+=3){
                        let br=(a%360)*Math.PI/180, r=280000;
                        let lt2=Math.asin(Math.sin(cp.lat()*Math.PI/180)*Math.cos(r/6371000)+Math.cos(cp.lat()*Math.PI/180)*Math.sin(r/6371000)*Math.cos(br));
                        let ln2=cp.lng()*Math.PI/180+Math.atan2(Math.sin(br)*Math.sin(r/6371000)*Math.cos(cp.lat()*Math.PI/180),Math.cos(r/6371000)-Math.sin(cp.lat()*Math.PI/180)*Math.sin(lt2));
                        p.push({lat:lt2*180/Math.PI, lng:ln2*180/Math.PI});
                    }
                    p.push({lat:cp.lat(),lng:cp.lng()});
                    wedges.push(new google.maps.Polygon({
                        path:p, strokeColor:'#333333', strokeWeight:2,
                        fillColor:c, fillOpacity:0.42, map:map
                    }));
                    let midA=(dAn[d].s+dAn[d].e)/2, labelR=96000;
                    let brL=midA*Math.PI/180;
                    let ltL=Math.asin(Math.sin(cp.lat()*Math.PI/180)*Math.cos(labelR/6371000)+Math.cos(cp.lat()*Math.PI/180)*Math.sin(labelR/6371000)*Math.cos(brL));
                    let lnL=cp.lng()*Math.PI/180+Math.atan2(Math.sin(brL)*Math.sin(labelR/6371000)*Math.cos(cp.lat()*Math.PI/180),Math.cos(labelR/6371000)-Math.sin(cp.lat()*Math.PI/180)*Math.sin(ltL));
                    dirLabels.push(new google.maps.Marker({
                        position:{lat:ltL*180/Math.PI,lng:lnL*180/Math.PI}, map:map,
                        label:{text:`[${d}] ${scores[d]}%`, color:'#1a237e', fontSize:'13px', fontWeight:'900', className:'map-label'},
                        icon:{path:google.maps.SymbolPath.CIRCLE, scale:0}
                    }));
                }

                let h = `<h4 style="color:#1a237e; margin-top:0; border-bottom:2px solid #1a237e; padding-bottom:5px;">[방위별 상의(象意) 분석 리포트]</h4>`;

                let goodS = Object.keys(shortTrip).filter(d => shortTrip[d].good);
                h += `<div class="short-trip-section"><b style="font-size:15px; color:#c05621;">🚗 근거리 단기 외출 가이드 (시반 적용)</b><br>
                    <p style="font-size:13px; color:#555; margin-top:5px;">입력하신 <b>${tTime}</b> 기준 시반(時盤) 상생 방향입니다.</p>`;
                if(goodS.length > 0){
                    goodS.forEach(d => {
                        let st = starDB[shortTrip[d].star];
                        h += `<div style="margin-top:8px; font-size:13px;"><b>[${d}방향]</b> ${st.loc} 방문 권장. ${st.drink} 마시기.</div>`;
                    });
                } else {
                    h += `<div style="margin-top:8px; font-size:13px; color:#e53e3e;">해당 시간대에는 근거리 길방이 없습니다.</div>`;
                }
                h += `</div>`;

                h += `<div style="background:#e8eaf6; padding:10px; border-radius:6px; margin-bottom:14px; font-size:12.5px; border-left:4px solid #1a237e;">
                    본명성: <b>${myS}성(${starDB[myS].n})</b> &nbsp;|&nbsp; 오행: <b>${myElement}</b><br>
                    연반 중궁: <b>${yS}성</b> &nbsp;|&nbsp; 월반 중궁: <b>${mS}성</b> &nbsp;|&nbsp; 일반 중궁: <b>${dS}성</b> &nbsp;|&nbsp; 시반 중궁: <b>${tS}성</b>
                </div>`;

                Object.keys(results).sort((a,b) => results[b].sc - results[a].sc).forEach(d => {
                    let r=results[d], cl=r.sc>=90?'#0000ff':(r.sc>=60?'#00bcd4':(r.sc>=30?'#ff9800':'#ff0000'));

                    let badS=r.stars[0];
                    if(r.b.some(x=>x.includes("오황"))) badS=5;
                    else if(r.b.some(x=>x.includes("연"))) badS=r.stars[0];
                    else if(r.b.some(x=>x.includes("월"))) badS=r.stars[1];
                    else badS=r.stars[2];
                    let badDt=starDB[badS], goodDt=starDB[r.stars[1]];

                    // V5.6 심화 로직: 오행 통관법 (기운 미약 방위용)
                    let dirStars = [r.stars[0], r.stars[1], r.stars[2], timeObj[d]];
                    let dirElements = [...new Set(dirStars.map(s => [1].includes(s)?'수':([2,5,8].includes(s)?'토':([3,4].includes(s)?'목':([6,7].includes(s)?'금':'화')))))];
                    let remedyAdvice = "";

                    if (myElement === '토' && dirElements.includes('목')) remedyAdvice = "화(火)의 기운(붉은색/보라색 의상, 밝은 조명, 따뜻한 차, 화려한 악세서리)을 강하게 써서 목극토(木剋土)의 살기를 화생토(火生土)의 상생으로 통관(通關)시키십시오.";
                    else if (myElement === '금' && dirElements.includes('화')) remedyAdvice = "토(土)의 기운(황토색/베이지색 의상, 흙길 맨발 걷기, 단맛 나는 음식, 도자기)을 써서 화극금(火剋金)의 살기를 토생금(土生金)으로 통관(通關)시키십시오.";
                    else if (myElement === '수' && dirElements.includes('토')) remedyAdvice = "금(金)의 기운(흰색/은색 의상, 금속 장신구, 정교한 시계, 둥근 과일)을 써서 토극수(土剋水)의 살기를 금생수(金生水)로 통관(通關)시키십시오.";
                    else if (myElement === '목' && dirElements.includes('금')) remedyAdvice = "수(水)의 기운(검정색/푸른색 의상, 물가 산책, 맑은 생수, 투명한 물건)을 써서 금극목(金剋木)의 살기를 수생목(水生木)으로 통관(通關)시키십시오.";
                    else if (myElement === '화' && dirElements.includes('수')) remedyAdvice = "목(木)의 기운(녹색/청색 의상, 화분이나 나무 소재 물건, 숲길 산책, 신맛 과일)을 써서 수극화(水剋火)의 살기를 목생화(木生火)로 통관(通關)시키십시오.";
                    else if (myElement === '토' && dirElements.includes('수')) remedyAdvice = "금(金)의 기운(흰색 의상, 정교한 금속 장식품)을 써서 토극수(土剋水)로 소모되는 기운을 토생금, 금생수로 부드럽게 순환시키십시오.";
                    else if (myElement === '수' && dirElements.includes('화')) remedyAdvice = "목(木)의 기운(녹색 의상, 싱그러운 식물 곁에 두기)을 써서 수극화(水剋火)로 소모되는 기운을 수생목, 목생화로 부드럽게 순환시키십시오.";
                    else if (myElement === '화' && dirElements.includes('금')) remedyAdvice = "토(土)의 기운(베이지색 의상, 흙을 밟으며 산책하기)을 써서 화극금(火剋金)으로 소모되는 기운을 화생토, 토생금으로 부드럽게 순환시키십시오.";
                    else if (myElement === '금' && dirElements.includes('목')) remedyAdvice = "수(水)의 기운(푸른색 의상, 맑은 물 충분히 마시기)을 써서 금극목(金剋木)으로 소모되는 기운을 금생수, 수생목으로 부드럽게 순환시키십시오.";
                    else if (myElement === '목' && dirElements.includes('토')) remedyAdvice = "화(火)의 기운(붉은색 포인트 의상, 따뜻한 음식 섭취)을 써서 목극토(木剋土)로 소모되는 기운을 목생화, 화생토로 부드럽게 순환시키십시오.";
                    else remedyAdvice = "해당 방위의 탁기를 중화하기 위해 출발 전 가벼운 명상과 심호흡으로 심신을 안정시키고 본명성의 길색(吉色) 옷을 입고 이동하십시오.";

                    let bestT=[];
                    if(r.sc >= 60){
                        for(let i=0; i<12; i++){
                            let tTS=getTimeStar(dS,`${(i*2+23)%24}:00`);
                            let tO={}, cur2=tTS;
                            for(let j=0; j<9; j++){tO[posNames[j]]=cur2; cur2++; if(cur2>9)cur2=1;}
                            if(goodEls.includes(tO[d]) && tO[d]!==5 && tO[opposites[d]]!==5) bestT.push(branchTimeMap[i]);
                        }
                    }

                    h += `<div class="dir-card">
                        <div class="dir-header"><span>${d}방향</span><span style="color:${cl}">${r.sc}%</span></div>
                        <div class="star-info-bar">연반: <b>${r.stars[0]}성(${starDB[r.stars[0]].n.split('(')[0]})</b> &nbsp;|&nbsp; 월반: <b>${r.stars[1]}성(${starDB[r.stars[1]].n.split('(')[0]})</b> &nbsp;|&nbsp; 일반: <b>${r.stars[2]}성(${starDB[r.stars[2]].n.split('(')[0]})</b></div>
                        <div class="score-bar-container"><div class="score-bar" style="width:${r.sc}%; background:${cl}"></div></div>`;

                    if(r.b.length > 0){
                        // 대흉살 종류별 정밀 해결 법칙 생성
                        let fatalRemedy = "";
                        if (r.b.some(x => x.includes("오황"))) fatalRemedy += "<div style='margin-bottom:8px;'>🔥 <b>[오황살 화해]</b> 만물이 부패하는 극흉의 방향입니다. 흙을 밟거나 파는 행위를 절대 금하고, 날것을 피하며 푹 익힌 음식만 섭취하고 침묵을 지키십시오.</div>";
                        if (r.b.some(x => x.includes("암검"))) fatalRemedy += "<div style='margin-bottom:8px;'>⚔️ <b>[암검살 화해]</b> 타인으로부터 예기치 않은 재난이 강제로 날아옵니다. 철저히 자신을 낮추고 양보하며, 시비나 다툼을 무조건 피하고 철저한 방어 운전을 하십시오.</div>";
                        if (r.b.some(x => x.includes("파"))) fatalRemedy += "<div style='margin-bottom:8px;'>⚡ <b>[파살 화해]</b> 계획이 깨지고 어긋납니다. 약속과 서류를 2~3번 교차 검증하고, 일정이 지연되거나 깨지더라도 분노하지 않는 마음의 여유를 가지십시오.</div>";
                        if (r.b.some(x => x.includes("본명") || x.includes("적살"))) fatalRemedy += "<div style='margin-bottom:8px;'>📉 <b>[본명/적살 화해]</b> 본인의 기운이 꺾이고 판단력이 흐려집니다. 중요한 의사 결정은 무조건 다음으로 미루고, 육체적 과로를 피해 휴식을 취하며 비상약을 지참하십시오.</div>";

                        h += `<div class="bad-section"><b>⚠️ 흉살 경고:</b>
                            <ul class="bad-list">${r.b.map(b => `<li>${badEffectsInfo[b]}</li>`).join('')}</ul>
                            <div class="remedy-box">
                                ${fatalRemedy}
                                <hr style="border:0; border-top:1px dashed #c53030; margin:8px 0;">
                                🛡️ <b>[기본 피흉 절대 수칙]:</b> <b>${badDt.badColor}</b> 계열 의상 착용 및 <b>${badDt.badItem}</b> 지참을 절대 금지하십시오.
                            </div>
                        </div>`;
                    } else if(r.sc >= 60){
                        h += `<div class="good-section">
                            <b style="font-size:15px;">✨ 정통 길방 취기법 (${goodDt.n})</b>
                            <div style="margin: 8px 0;">${goodDt.luck.split(', ').map(l=>`<span class="luck-tag">${l}</span>`).join('')}</div>
                            <div class="info-grid">
                                <div class="info-row"><div class="info-label">⏱️ 체류</div><div class="info-data"><span class="badge">${goodDt.duration}</span></div></div>
                                <div class="info-row"><div class="info-label">🚀 출발</div><div class="info-data">${bestT.length>0?'추천: '+bestT.slice(0,3).join(', '):'낮 시간 선택'}</div></div>
                                <div class="info-row"><div class="info-label">📍 장소</div><div class="info-data">${goodDt.loc}</div></div>
                                <div class="info-row"><div class="info-label">🍽️ 식음</div><div class="info-data">${goodDt.food} / ${goodDt.drink}</div></div>
                                <div class="info-row"><div class="info-label">👕 의상</div><div class="info-data"><b>${goodDt.goodColor}</b> 착용</div></div>
                                <div class="info-row"><div class="info-label">💎 물건</div><div class="info-data"><b>${goodDt.goodItem}</b> 소지</div></div>
                                <div class="info-row"><div class="info-label">🚫 피할것</div><div class="info-data">${goodDt.badColor} / ${goodDt.badItem}</div></div>
                            </div>
                            <div class="highlight-box">🏃 <b>핵심 행동:</b> ${goodDt.act}</div>
                        </div>`;
                    } else {
                        h += `<div class="weak-section"><b>⚠️ 기운 미약:</b> 흉살은 없으나 본명성과 상극인 방위입니다.<div class="remedy-weak-box">🛡️ <b>오행 화해(化解) 피흉법:</b><br>${remedyAdvice}</div></div>`;
                    }
                    h += `</div>`;
                });

                document.getElementById('result-panel').innerHTML = h;
            } catch(e) {
                console.error(e);
                alert("오류 발생: " + e.message);
            }
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=구글지도API키&callback=initMap" async defer></script>
</body>
</html>
