            4: { n: "4록목성(四綠木星)", duration: "2박 3일", luck: "결혼/연애운, 좋은 거래처 확보, 신용 회복", loc: "식물원, 바람 통하는 언덕, 공항, 카페", food: "파스타, 우동, 국수(긴 요리), 닭고기", drink: "향기로운 꽃차", goodColor: "연녹색, 하늘색", goodItem: "향수, 긴 리본/넥타이", badColor: "하늘색, 청색", badItem: "긴 목걸이, 하늘색 손수건", act: "먼 곳 지인에게 연락, 해안 산책" },
            5: { n: "5황토성(五黃土星)", duration: "취기 절대 불가", luck: "절대 흉방 (부패, 파괴, 극단적 손실)", loc: "황무지, 폐기장, 공사장, 인적 드문 곳", food: "익힌 음식", drink: "해독 작용 차", goodColor: "해당 없음", goodItem: "취기 금지", badColor: "노란색, 흙색 금지", badItem: "흰색 옷, 금속 악세서리 다수", act: "이동 최소화 및 침묵 유지" },
            6: { n: "6백금성(六白金星)", duration: "1박 2일", luck: "승진/권위, 귀인 조우, 대규모 투자", loc: "대형 사찰, 웅장한 바위산, 관공서, 고급 호텔", food: "고급 한정식, 둥근 과일(사과/멜론)", drink: "고급 명주, 스파클링 워터", goodColor: "백색, 은색, 금색", goodItem: "고급 아날로그 시계, 도장", badColor: "순백색", badItem: "은색 반지 다수, 흰색 상의", act: "사찰 참배 및 기도, 격식 차리기" },
            7: { n: "7적금성(七赤金星)", duration: "당일~1박 2일", luck: "여유 금전운, 유희/연애운, 화술 향상", loc: "얕은 계곡, 번화가, 화려한 카페, 은행", food: "치킨 등 튀김류, 달콤한 디저트", drink: "달콤한 커피, 칵테일", goodColor: "핑크, 오렌지", goodItem: "작은 종, 화려한 립스틱", badColor: "진한 분홍색", badItem: "핑크색 파우치, 화려한 귀걸이", act: "카페 수다, 현금 소비, 많이 웃기" },
            8: { n: "8백토성(八白土星)", duration: "3박 4일 이상", luck: "상황의 긍정적 역전, 상속/부동산, 악연 단절", loc: "높은 산, 전망대, 케이블카, 호텔 객실", food: "쇠고기 요리, 페이스트리", drink: "진한 쌍화차, 단 음료", goodColor: "베이지, 황토색", goodItem: "튼튼한 가죽 가방, 지역 돌", badColor: "베이지, 황토", badItem: "베이지색 모자, 가죽 팔찌", act: "전망대 관람, 새로운 계획 세우기" },
            9: { n: "9자화성(九紫火星)", duration: "당일 집중", luck: "미용/예술운, 시험 합격, 선견지명, 명예", loc: "미술관, 도서관, 야경 명소, 미용실, 채광 좋은 곳", food: "갑각류(게/새우), 붉은 살코기, 초콜릿", drink: "레드 와인, 블랙 커피", goodColor: "적색, 보라색", goodItem: "안경/선글라스, 예술 서적", badColor: "붉은색, 보라색", badItem: "붉은색 양말, 안경 반드시 지참", act: "미술 작품 감상, 문서/일기 작성" }
        };

        const posNames = ["중앙", "서북", "서", "북동", "남", "북", "남서", "동", "동남"];
        const opposites = { "서북": "동남", "동남": "서북", "서": "동", "동": "서", "북동": "남서", "남서": "북동", "남": "북", "북": "남", "중앙": "없음" };
        const branchTimeMap = ["자(23~01)", "축(01~03)", "인(03~05)", "묘(05~07)", "진(07~09)", "사(09~11)", "오(11~13)", "미(13~15)", "신(15~17)", "유(17~19)", "술(19~21)", "해(21~23)"];

        window.onload = function() {
            initMap();
            const savedBD = localStorage.getItem('masterBirthDate');
            const savedBT = localStorage.getItem('masterBirthTime');
            let today = new Date();
            if(savedBD) document.getElementById('birth-date').value = savedBD;
            if(savedBT) document.getElementById('birth-time').value = savedBT;
            document.getElementById('travel-date').value = today.toISOString().split('T')[0];
        };

        function initMap() {
            var loc = { lat: 37.785, lng: 126.833 };
            map = new google.maps.Map(document.getElementById('map'), { center: loc, zoom: 7.2, mapTypeId: 'roadmap' });
            centerMarker = new google.maps.Marker({ position: loc, map: map, draggable: true });
            geocoder = new google.maps.Geocoder();

            // 마커 드래그 시 실시간 중심축 업데이트
            centerMarker.addListener('dragend', function() {
                analyzeDirection(); 
            });
        }

        function searchLocation() {
            var addr = document.getElementById('search-address').value;
            if(!addr || !geocoder) return;
            geocoder.geocode({ 'address': addr }, function(r, s) {
                if (s === 'OK') { 
                    var newPos = r[0].geometry.location;
                    map.setCenter(newPos); 
                    centerMarker.setPosition(newPos);
                    analyzeDirection(); // 검색과 동시에 즉시 축 이동 및 재분석
                }
            });
        }

        function getStarVal(y, m, d, mode) {
            y = parseInt(y, 10); m = parseInt(m, 10); d = parseInt(d, 10);
            if (mode === 'y') {
                if (m < 2 || (m === 2 && d < 4)) y -= 1;
                let s = String(y).split('').reduce((a,b)=>parseInt(a)+parseInt(b),0);
                while(s>9) s = String(s).split('').reduce((a,b)=>parseInt(a)+parseInt(b),0);
                let res = 11 - s; while(res<=0) res+=9; while(res>9) res-=9; return res;
            }
            if (mode === 'm') {
                let adjY = m < 2 ? y - 1 : y;
                let zodiac = (adjY - 4) % 12; if(zodiac < 0) zodiac += 12;
                let base = [0,3,6,9].includes(zodiac) ? 8 : ([1,4,7,10].includes(zodiac) ? 5 : 2);
                let res = base - (m < 2 ? m+10 : m-2);
                while(res <= 0) res += 9; while(res > 9) res -= 9; return res;
            }
            let ts = Date.UTC(y, m-1, d);
            let res = 9 - (Math.floor(ts / 86400000) % 9); 
            while(res <= 0) res += 9; while(res > 9) res -= 9; return res;
        }

        function getTimeStar(dStar, timeStr) {
            let hour = parseInt(timeStr.split(':')[0], 10);
            let branchIdx = Math.floor((hour + 1) % 24 / 2);
            let tStar = (dStar + branchIdx) % 9;
            return tStar === 0 ? 9 : tStar;
        }

        function analyzeDirection() {
            try {
                let bStr = document.getElementById('birth-date').value, tStr = document.getElementById('travel-date').value, tTime = document.getElementById('travel-time').value;
                if(!bStr || !tStr) { alert("날짜 정보를 입력하십시오."); return; }
                
                localStorage.setItem('masterBirthDate', bStr);
                localStorage.setItem('masterBirthTime', document.getElementById('birth-time').value);
                
                let b = bStr.split('-'), t = tStr.split('-');
                let myS = getStarVal(b[0], b[1], b[2], 'y'), yS = getStarVal(t[0], t[1], t[2], 'y'), mS = getStarVal(t[0], t[1], t[2], 'm'), dS = getStarVal(t[0], t[1], t[2], 'd');
                let tS = getTimeStar(dS, tTime);

                let bds = [yS, mS, dS].map(c => { let obj={}; let cur=c; for(let i=0; i<9; i++) { obj[posNames[i]]=cur; cur++; if(cur>9) cur=1; } return obj; });
                let timeObj={}; let curT=tS; for(let i=0; i<9; i++) { timeObj[posNames[i]]=curT; curT++; if(curT>9) curT=1; }

                let scores = {}, results = {}, shortTrip = {};
                let goodEls = {'수':[6,7,1,3,4],'목':[1,3,4,9],'화':[3,4,9,2,8],'토':[9,2,8,6,7],'금':[2,8,6,7,1]}[[1].includes(myS)?'수':([2,5,8].includes(myS)?'토':([3,4].includes(myS)?'목':([6,7].includes(myS)?'금':'화')))];

                posNames.forEach(dir => {
                    if(dir === "중앙") return;
                    let sc = 0, bads = [];
                    bds.forEach((board, idx) => {
                        let st = board[dir], w = idx===0?60:(idx===1?30:10), isB=false;
                        if(st===5) { bads.push(idx===0?"연오황":idx===1?"월오황":"일오황"); isB=true; }
                        else if(board[opposites[dir]]===5) { bads.push(idx===0?"연암검":idx===1?"월암검":"일암검"); isB=true; }
                        else if(st===myS) { bads.push(idx===0?"연본명":idx===1?"월본명":"일본명"); isB=true; }
                        else if(board[opposites[dir]]===myS) { bads.push(idx===0?"연적살":idx===1?"월적살":"일적살"); isB=true; }
                        if(!isB) sc += (goodEls.includes(st)?w:w/4); else sc -= 100;
                    });
                    scores[dir] = Math.max(0, Math.round(sc));
                    results[dir] = { sc: Math.max(0, Math.round(sc)), b: [...new Set(bads)], stars: [bds[0][dir], bds[1][dir], bds[2][dir]] };
                    let ts = timeObj[dir];
                    shortTrip[dir] = { good: (!(ts===5 || timeObj[opposites[dir]]===5 || ts===myS || timeObj[opposites[dir]]===myS) && goodEls.includes(ts)), star: ts };
                });

                wedges.forEach(w => w.setMap(null)); wedges = [];
                dirLabels.forEach(l => l.setMap(null)); dirLabels = [];
                let cp = centerMarker.getPosition();
                const dAn = { "북": {s: 337.5, e: 382.5}, "북동": {s: 22.5, e: 67.5}, "동": {s: 67.5, e: 112.5}, "동남": {s: 112.5, e: 157.5}, "남": {s: 157.5, e: 202.5}, "남서": {s: 202.5, e: 247.5}, "서": {s: 247.5, e: 292.5}, "서북": {s: 292.5, e: 337.5} };
                
                for (let d in dAn) {
                    let s = scores[d], c = s>=90?'#0000ff':(s>=60?'#00bcd4':(s>=30?'#ff9800':'#ff0000')), p = [{lat: cp.lat(), lng: cp.lng()}];
                    for (let a = dAn[d].s; a <= dAn[d].e; a += 3) {
                        let br = (a % 360) * Math.PI / 180, r=280000; 
                        let lt2 = Math.asin(Math.sin(cp.lat()*Math.PI/180)*Math.cos(r/6371000)+Math.cos(cp.lat()*Math.PI/180)*Math.sin(r/6371000)*Math.cos(br));
                        let ln2 = cp.lng()*Math.PI/180 + Math.atan2(Math.sin(br)*Math.sin(r/6371000)*Math.cos(cp.lat()*Math.PI/180), Math.cos(r/6371000)-Math.sin(cp.lat()*Math.PI/180)*Math.sin(lt2));
                        p.push({lat: lt2*180/Math.PI, lng: ln2*180/Math.PI});
                    }
                    p.push({lat: cp.lat(), lng: cp.lng()});
                    wedges.push(new google.maps.Polygon({ path: p, strokeColor: '#000000', strokeWeight: 2, fillColor: c, fillOpacity: 0.2, map: map }));
                    
                    let midA = (dAn[d].s + dAn[d].e) / 2;
                    let labelR = 96000;
                    let brL = midA * Math.PI / 180;
                    let ltL = Math.asin(Math.sin(cp.lat()*Math.PI/180)*Math.cos(labelR/6371000)+Math.cos(cp.lat()*Math.PI/180)*Math.sin(labelR/6371000)*Math.cos(brL));
                    let lnL = cp.lng()*Math.PI/180 + Math.atan2(Math.sin(brL)*Math.sin(labelR/6371000)*Math.cos(cp.lat()*Math.PI/180), Math.cos(labelR/6371000)-Math.sin(cp.lat()*Math.PI/180)*Math.sin(ltL));
                    dirLabels.push(new google.maps.Marker({ position: {lat: ltL*180/Math.PI, lng: lnL*180/Math.PI}, map: map, label: { text: `[${d}]`, color: '#1a237e', fontSize: '14px', fontWeight: '900', className: 'map-label' }, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 } }));
                }

                let h = `<h4 style="color:#1a237e; margin-top:0; border-bottom:2px solid #1a237e; padding-bottom:5px;">[방위별 상의(象意) 분석 리포트]</h4>`;
                let goodS = Object.keys(shortTrip).filter(d => shortTrip[d].good);
                h += `<div class="short-trip-section"><b style="font-size:15px; color:#c05621;">🚗 근거리 단기 외출 가이드 (시반 적용)</b><br><p style="font-size:13px; color:#555; margin-top:5px;">입력하신 <b>${tTime}</b> 기준 상생 방향입니다.</p>`;
                if(goodS.length > 0) goodS.forEach(d => { let st = starDB[shortTrip[d].star]; h += `<div style="margin-top:8px; font-size:13px;"><b>[${d}방향]</b> ${st.loc} 방문 권장. ${st.drink} 마시기.</div>`; });
                else h += `<div style="margin-top:8px; font-size:13px; color:#e53e3e;">해당 시간대에는 근거리 길방이 없습니다.</div>`;
                h += `</div><p style="font-size:13px; color:#555;">본명성: <b>${myS}성</b> | 분석 기준: 연(${yS}) 월(${mS}) 일(${dS})</p>`;
                
                Object.keys(results).sort((a,b)=>results[b].sc - results[a].sc).forEach(d => {
                    let r = results[d], cl = r.sc>=90?'#0000ff':(r.sc>=60?'#00bcd4':(r.sc>=30?'#ff9800':'#ff0000'));
                    let badS = r.stars[0]; if(r.b.some(x=>x.includes("오황"))) badS=5; else if(r.b.some(x=>x.includes("연"))) badS=r.stars[0]; else if(r.b.some(x=>x.includes("월"))) badS=r.stars[1]; else badS=r.stars[2];
                    let badDt = starDB[badS], goodDt = starDB[r.stars[1]];
                    let bestT = []; if(r.sc >= 60) { for(let i=0; i<12; i++) { let tTS = getTimeStar(dS, `${(i*2+23)%24}:00`); let tO={}; let cur=tTS; for(let j=0; j<9; j++){tO[posNames[j]]=cur; cur++; if(cur>9)cur=1;} if(goodEls.includes(tO[d]) && tO[d]!==5 && tO[opposites[d]]!==5) bestT.push(branchTimeMap[i]); } }
                    
                    h += `<div class="dir-card"><div class="dir-header"><span>${d}방향</span> <span style="color:${cl}">${r.sc}%</span></div><div class="score-bar-container"><div class="score-bar" style="width:${r.sc}%; background:${cl}"></div></div>`;
                    if(r.b.length > 0) h += `<div class="bad-section"><b>⚠️ 흉살 경고:</b><ul class="bad-list">${r.b.map(b => `<li>${badEffectsInfo[b]}</li>`).join('')}</ul><div class="remedy-box">🛡️ <b>[${badDt.n}] 상쇄 비책:</b> ${badDt.badColor} 계열 의상 착용 및 <b>${badDt.badItem}</b> 지참 필수.</div></div>`;
                    else if(r.sc >= 60) h += `<div class="good-section"><b style="font-size:15px;">✨ 정통 길방 취기법 (${goodDt.n})</b><div style="margin: 8px 0;">${goodDt.luck.split(', ').map(l => `<span class="luck-tag">${l}</span>`).join('')}</div><div class="info-grid"><div class="info-row"><div class="info-label">⏱️ 체류</div><div class="info-data"><span class="badge">${goodDt.duration}</span></div></div><div class="info-row"><div class="info-label">🚀 출발</div><div class="info-data">${bestT.length>0 ? '추천: '+bestT.slice(0,3).join(', ') : '낮 시간 선택'}</div></div><div class="info-row"><div class="info-label">📍 장소</div><div class="info-data">${goodDt.loc}</div></div><div class="info-row"><div class="info-label">🍽️ 식음</div><div class="info-data">${goodDt.food} / ${goodDt.drink}</div></div><div class="info-row"><div class="info-label">👕 의상</div><div class="info-data"><b>${goodDt.goodColor}</b> 착용</div></div><div class="info-row"><div class="info-label">💎 물건</div><div class="info-data"><b>${goodDt.goodItem}</b> 소지</div></div></div><div class="highlight-box">🏃 <b>핵심 행동:</b> ${goodDt.act}</div></div>`;
                    else h += `<div class="weak-section"><b>⚠️ 기운 미약:</b> 흉살은 없으나 본명성과 상극인 방위입니다.</div>`;
                    h += `</div>`;
                });
                document.getElementById('result-panel').innerHTML = h;
            } catch (e) { alert("오류 발생"); }
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAamEQotxhdSuayKAoEFN--sDsyAqt42B8&callback=initMap" async defer></script>
</body>
