            });

        function getStarVal(y, m, d, mode) {
            y = parseInt(y, 10); m = parseInt(m, 10); d = parseInt(d, 10);
            if (mode === 'y') {
                if (m < 2 || (m === 2 && d < 4)) y -= 1;
                let s = String(y).split('').reduce((a,b)=>parseInt(a)+parseInt(b),0);
                while(s>9) s = String(s).split('').reduce((a,b)=>parseInt(a)+parseInt(b),0);
                let res = 11 - s; while(res<=0) res+=9; while(res>9) res-=9; return res;
            }
            if (mode === 'm') {
                let adjY = m < 2 ? y - 1 : y;
                let zodiac = (adjY - 4) % 12; if(zodiac < 0) zodiac += 12;
                let base = [0,3,6,9].includes(zodiac) ? 8 : ([1,4,7,10].includes(zodiac) ? 5 : 2);
                let res = base - (m < 2 ? m+10 : m-2);
                while(res <= 0) res += 9; while(res > 9) res -= 9; return res;
            }
            let ts = Date.UTC(y, m-1, d);
            let res = 9 - (Math.floor(ts / 86400000) % 9); 
            while(res <= 0) res += 9; while(res > 9) res -= 9; return res;
        }

            let hour = parseInt(timeStr.split(':')[0], 10);
            let branchIdx = Math.floor((hour + 1) % 24 / 2);

            return tStar === 0 ? 9 : tStar;

                    bds.forEach((b, idx) => {
                        let st = b[dir], w = idx===0?60:(idx===1?30:10), isB=false;
                        if(st===5) { bads.push(idx===0?"연오황":idx===1?"월오황":"일오황"); isB=true; }
                        else if(b[opposites[dir]]===5) { bads.push(idx===0?"연암검":idx===1?"월암검":"일암검"); isB=true; }
                        else if(st===myS) { bads.push(idx===0?"연본명":idx===1?"월본명":"일본명"); isB=true; }
                        else if(b[opposites[dir]]===myS) { bads.push(idx===0?"연적살":idx===1?"월적살":"일적살"); isB=true; }
                        
                        if(!isB) {
                            sc += (goodEls.includes(st)?w:w/4);
                        } else {
                            sc -= 100;
                        }
                    });
                    
                    scores[dir] = Math.max(0, Math.round(sc));
                    results[dir] = { sc: Math.max(0, Math.round(sc)), b: [...new Set(bads)], stars: [bds[0][dir], bds[1][dir], bds[2][dir]] };
                    
                    let timeStar = timeObj[dir];
                    shortTrip[dir] = { good: (!(timeStar===5 || timeObj[opposites[dir]]===5 || timeStar===myS || timeObj[opposites[dir]]===myS) && goodEls.includes(timeStar)), star: timeStar };
                });

                wedges.forEach(w => w.setMap(null)); wedges = [];
                dirLabels.forEach(l => l.setMap(null)); dirLabels = [];
                let cp = centerMarker.getPosition();
                const dAn = { "북": {s: 337.5, e: 382.5}, "북동": {s: 22.5, e: 67.5}, "동": {s: 67.5, e: 112.5}, "동남": {s: 112.5, e: 157.5}, "남": {s: 157.5, e: 202.5}, "남서": {s: 202.5, e: 247.5}, "서": {s: 247.5, e: 292.5}, "서북": {s: 292.5, e: 337.5} };
                
                for (let d in dAn) {
                    let s = scores[d], c = s>=90?'#0000ff':(s>=60?'#00bcd4':(s>=30?'#ff9800':'#ff0000')), p = [{lat: cp.lat(), lng: cp.lng()}];
                    
                    // 폴리곤 반경 20% 축소 (350000 -> 280000)
                    for (let a = dAn[d].s; a <= dAn[d].e; a += 3) {
                        let br = (a % 360) * Math.PI / 180, r=280000; 
                        let lt2 = Math.asin(Math.sin(cp.lat()*Math.PI/180)*Math.cos(r/6371000)+Math.cos(cp.lat()*Math.PI/180)*Math.sin(r/6371000)*Math.cos(br));
                        let ln2 = cp.lng()*Math.PI/180 + Math.atan2(Math.sin(br)*Math.sin(r/6371000)*Math.cos(cp.lat()*Math.PI/180), Math.cos(r/6371000)-Math.sin(cp.lat()*Math.PI/180)*Math.sin(lt2));
                        p.push({lat: lt2*180/Math.PI, lng: ln2*180/Math.PI});
                    }
                    p.push({lat: cp.lat(), lng: cp.lng()});
                    wedges.push(new google.maps.Polygon({ path: p, strokeColor: '#000000', strokeWeight: 2, fillColor: c, fillOpacity: 0.2, map: map }));
                    
                    // 라벨 반경 20% 축소 (120000 -> 96000)
                    let midAngle = (dAn[d].s + dAn[d].e) / 2;
                    let labelR = 96000;
                    let brLab = midAngle * Math.PI / 180;
                    let ltLab = Math.asin(Math.sin(cp.lat()*Math.PI/180)*Math.cos(labelR/6371000)+Math.cos(cp.lat()*Math.PI/180)*Math.sin(labelR/6371000)*Math.cos(brLab));
                    let lnLab = cp.lng()*Math.PI/180 + Math.atan2(Math.sin(brLab)*Math.sin(labelR/6371000)*Math.cos(cp.lat()*Math.PI/180), Math.cos(labelR/6371000)-Math.sin(cp.lat()*Math.PI/180)*Math.sin(ltLab));
                    
                    let marker = new google.maps.Marker({
                        position: {lat: ltLab*180/Math.PI, lng: lnLab*180/Math.PI},
                        map: map,
                        label: { text: `[${d}방향]`, color: '#1a237e', fontSize: '15px', fontWeight: '900', className: 'map-label' },
                        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 }
                    });
                    dirLabels.push(marker);
                }

                let h = `<h4 style="color:#1a237e; margin-top:0; border-bottom:2px solid #1a237e; padding-bottom:5px;">[방위별 상의(象意) 분석 리포트]</h4>`;
                
                let goodShortDirs = Object.keys(shortTrip).filter(d => shortTrip[d].good);
                h += `<div class="short-trip-section">
                        <b style="font-size:15px; color:#c05621;">🚗 근거리 단기 외출 가이드 (시반 적용)</b><br>
                        <p style="font-size:13px; color:#555; margin-top:5px;">입력하신 <b>${tTime}</b> 기준, 가볍게 1~2시간 외출하기 좋은 상생 방향입니다.</p>`;
                if(goodShortDirs.length > 0) {
                    goodShortDirs.forEach(d => {
                        let stData = starDB[shortTrip[d].star];
                        h += `<div style="margin-top:8px; font-size:13px;"><b>[${d}방향]</b> ${stData.loc} 방문 권장. ${stData.drink} 마시기.</div>`;
                    });
                } else {
                    h += `<div style="margin-top:8px; font-size:13px; color:#e53e3e;">해당 시간대에는 근거리 길방이 없습니다. 주의하십시오.</div>`;
                }
                h += `</div>`;

                h += `<p style="font-size:13px; color:#555;">본명성: <b>${myS}성</b> | 분석 기준: 연(${yS}) 월(${mS}) 일(${dS})</p>`;
                
                Object.keys(results).sort((a,b)=>results[b].sc - results[a].sc).forEach(d => {
                    let r = results[d], cl = r.sc>=90?'#0000ff':(r.sc>=60?'#00bcd4':(r.sc>=30?'#ff9800':'#ff0000'));
                    
                    let targetBadStar = r.stars[0]; 
                    if(r.b.some(x => x.includes("오황"))) targetBadStar = 5;
                    else if (r.b.some(x => x.includes("연"))) targetBadStar = r.stars[0];
                    else if (r.b.some(x => x.includes("월"))) targetBadStar = r.stars[1];
                    else targetBadStar = r.stars[2];
                    
                    let badDt = starDB[targetBadStar];
                    let goodDt = starDB[r.stars[1]];

                    let bestTimes = [];
                    if(r.sc >= 60) {
                        for(let i=0; i<12; i++) {
                            let testTime = `${(i*2+23)%24}:00`;
                            let testTS = getTimeStar(dS, testTime);
                            let testObj={}; let cur=testTS; for(let j=0; j<9; j++) { testObj[posNames[j]]=cur; cur++; if(cur>9) cur=1; }
                            if(goodEls.includes(testObj[d]) && testObj[d]!==5 && testObj[opposites[d]]!==5) bestTimes.push(branchTimeMap[i]);
                        }
                    }

                    h += `<div class="dir-card">`;
                    h += `<div class="dir-header"><span>${d}방향</span> <span style="color:${cl}">${r.sc}%</span></div>`;
                    h += `<div class="score-bar-container"><div class="score-bar" style="width:${r.sc}%; background:${cl}"></div></div>`;
                    
                    if(r.b.length > 0) {
                        let badDetails = r.b.map(b => `<li style="margin-bottom:4px;">${badEffectsInfo[b]}</li>`).join('');
                        h += `<div class="bad-section">
                                <b>⚠️ 흉살 경고 (절대 주의):</b>
                                <ul class="bad-list">${badDetails}</ul>
                                <div class="remedy-box">
                                🛡️ <b>[${badDt.n}] 기운 상쇄 비책:</b> 부득이 방문 시 <b>${badDt.badColor} 계열</b> 의상을 착용하고 <b>${badDt.badItem}</b>을(를) 지니십시오. 가급적 말을 아끼는 것이 좋습니다.
                                </div>
                              </div>`;
                    }
                    else if(r.sc >= 60) {
                        let luckTags = goodDt.luck.split(', ').map(l => `<span class="luck-tag">${l}</span>`).join('');
                        h += `<div class="good-section">
                                <b style="font-size:15px;">✨ 정통 길방 취기법 (${goodDt.n})</b>
                                <div style="margin: 8px 0;">${luckTags}</div>
                                <div class="info-grid">
                                    <div class="info-row"><div class="info-label">⏱️ 체류</div><div class="info-data"><span class="badge">${goodDt.duration}</span></div></div>
                                    <div class="info-row"><div class="info-label">🚀 출발</div><div class="info-data">${bestTimes.length>0 ? '추천 시간대: '+bestTimes.slice(0,3).join(', ') : '해당 일에는 맑은 낮 시간대 선택'}</div></div>
                                    <div class="info-row"><div class="info-label">📍 장소</div><div class="info-data">${goodDt.loc}</div></div>
                                    <div class="info-row"><div class="info-label">🍽️ 식음</div><div class="info-data">${goodDt.food} / ${goodDt.drink}</div></div>
                                    <div class="info-row"><div class="info-label">👕 의상</div><div class="info-data">운을 돕는 <b>${goodDt.goodColor}</b> 색상 착용</div></div>
                                    <div class="info-row"><div class="info-label">💎 물건</div><div class="info-data">기운을 담아올 <b>${goodDt.goodItem}</b> 소지/구입</div></div>
                                </div>
                                <div class="highlight-box">🏃 <b>핵심 행동:</b> ${goodDt.act}</div>
                              </div>`;
                    }
                    else {
                        h += `<div class="weak-section">
                                <b>⚠️ 기운 미약 (취기 비권장):</b> 강력한 흉살은 없으나 목적지와 본명성의 오행이 상극(相剋)하여 상생 효과가 없습니다. 취기 행동은 삼가고 평범한 일정을 보내십시오.
                              </div>`;
                    }
                    h += `</div>`;
                });
                document.getElementById('result-panel').innerHTML = h;
            } catch (e) { alert("연산 오류."); console.log(e); }
        }
    </script>
    <style>
        .map-label { text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAamEQotxhdSuayKAoEFN--sDsyAqt42B8&callback=initMap" async defer></script>
</body>
</html>
